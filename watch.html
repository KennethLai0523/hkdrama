<!DOCTYPE html>
<html>
<head>
  <title>Watch Episode</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

  <header class="topbar">
    <div class="logo">爱<span>看剧</span></div>
    <nav>
      <a href="index.html">首页</a>
    </nav>
  </header>

  <main style="padding:20px">
    <h1 id="episodeTitle">Loading...</h1>
    <div id="player"></div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBD7Zlt2I_I1v1kHFgymewHHDTE3dJxvMk",
      authDomain: "drama-website-f6bd8.firebaseapp.com",
      projectId: "drama-website-f6bd8",
      storageBucket: "drama-website-f6bd8.firebasestorage.app",
      messagingSenderId: "49077559897",
      appId: "1:49077559897:web:4c248dff8957b3b2cb0748"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const dramaId = params.get("id");
    const epNumber = parseInt(params.get("ep"));

    function decodeVideoUrl(savedUrl) {
      let videoUrl = savedUrl;

      try {
        const decoded = atob(savedUrl);

        // New format: reverse + base64
        const reversedBack = decoded.split("").reverse().join("");
        if (reversedBack.startsWith("http")) {
          return reversedBack;
        }

        // Old format: base64 only
        if (decoded.startsWith("http")) {
          return decoded;
        }
      } catch (error) {
        // Very old format: normal URL
      }

      return videoUrl;
    }

    async function loadVideo() {
      if (!dramaId || !epNumber) {
        document.getElementById("episodeTitle").textContent = "Invalid request";
        return;
      }

      const docRef = doc(db, "dramas", dramaId);
      const docSnap = await getDoc(docRef);

      if (!docSnap.exists()) {
        document.getElementById("episodeTitle").textContent = "Drama not found";
        return;
      }

      const data = docSnap.data();
      const episodes = data.episodes || [];

      const episode = episodes.find(e => Number(e.number) === Number(epNumber));

      if (!episode) {
        document.getElementById("episodeTitle").textContent = "Episode not found";
        return;
      }

      document.getElementById("episodeTitle").textContent = episode.title;

      let videoUrl = decodeVideoUrl(episode.videoUrl);

      // add random characters behind the .m3u8 URL
      // add random query + fragment behind the .m3u8 URL
      const randomText = Math.random().toString(36).substring(2, 12);

      videoUrl += (videoUrl.includes("?") ? "&" : "?") + "r=" + randomText;
      videoUrl += "#mask=" + randomText;

      document.getElementById("player").innerHTML = `
        <video id="video" controls style="width:100%;height:100%;"></video>
      `;

      const video = document.getElementById("video");

      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(videoUrl); // 🔥 USE YOUR DECODED URL HERE
        hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoUrl;
      }
    }

    loadVideo();
  </script>

</body>
</html>
