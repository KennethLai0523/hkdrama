<!DOCTYPE html>
<html>
<head>
  <title>Drama Detail</title>
  <link rel="stylesheet" href="style.css">

  <style>
    @media (max-width: 900px) {
      #header .topbar {
        height: auto !important;
        padding: 10px 12px !important;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        gap: 10px !important;
        overflow: visible !important;
      }

      #header .logo {
        font-size: 24px !important;
        padding: 6px 10px !important;
      }

      #header nav {
        display: flex !important;
        flex-direction: row !important;
        justify-content: center !important;
        flex-wrap: wrap !important;
        gap: 12px !important;
        width: 100% !important;
      }

      #header nav a {
        font-size: 14px !important;
        white-space: nowrap !important;
      }

      #header .ad-contact {
        margin: 0 !important;
        font-size: 12px !important;
        text-align: center !important;
        white-space: normal !important;
        width: 100% !important;
      }

      #header .search {
        margin: 0 !important;
        width: 90% !important;
        max-width: 320px !important;
        justify-content: space-between !important;
      }

      #header .search input {
        width: 100% !important;
      }
    }
  </style>
</head>
<body>

  <div id="header"></div>

  <script>
    fetch("header.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("header").innerHTML = html;

        const input = document.getElementById("searchInput");
        const button = document.getElementById("searchBtn");

        function doSearch() {
          const keyword = input.value.trim();

          if (!keyword) {
            window.location.href = "index.html";
            return;
          }

          window.location.href = "index.html?search=" + encodeURIComponent(keyword);
        }

        button.addEventListener("click", doSearch);

        input.addEventListener("keydown", function(e) {
          if (e.key === "Enter") {
            doSearch();
          }
        });
      });
  </script>

  <main>
    <section class="drama-detail">
      <img id="poster" src="" class="detail-poster" alt="Drama Poster">

      <div>
        <h1 id="title"></h1>
        <p><strong>主演:</strong> <span id="actors">暂无</span></p>
        <p><strong>分类:</strong> <span id="category">暂无</span></p>
        <p><strong>年份:</strong> <span id="year"></span></p>
        <p><strong>简介:</strong> <span id="description"></span></p>

        <a id="playBtn" class="play-btn" href="#">立即播放</a>
      </div>
    </section>

    <section class="episode-section">
      <h2>播放集数</h2>
      <div class="episode-grid" id="episodeGrid"></div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBD7Zlt2I_I1v1kHFgymewHHDTE3dJxvMk",
      authDomain: "drama-website-f6bd8.firebaseapp.com",
      projectId: "drama-website-f6bd8",
      storageBucket: "drama-website-f6bd8.firebasestorage.app",
      messagingSenderId: "49077559897",
      appId: "1:49077559897:web:4c248dff8957b3b2cb0748"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const dramaId = params.get("id");

    async function loadDrama() {
      if (!dramaId) {
        document.querySelector("main").innerHTML = "<h2>Drama not found</h2>";
        return;
      }

      const docRef = doc(db, "dramas", dramaId);
      const docSnap = await getDoc(docRef);

      if (!docSnap.exists()) {
        document.querySelector("main").innerHTML = "<h2>Drama not found</h2>";
        return;
      }

      const data = docSnap.data();

      document.getElementById("poster").src = data.poster || "";
      document.getElementById("title").textContent = data.title || "";
      document.getElementById("actors").textContent = data.actors || "暂无";
      document.getElementById("category").textContent = data.category || "暂无";
      document.getElementById("year").textContent = data.year || "";
      document.getElementById("description").textContent = data.description || "";

      const episodes = data.episodes || [];
      const episodeGrid = document.getElementById("episodeGrid");

      if (episodes.length > 0) {
        document.getElementById("playBtn").href =
          `watch.html?id=${dramaId}&ep=${episodes[0].number}`;

        episodes.forEach((episode) => {
          const a = document.createElement("a");
          a.href = `watch.html?id=${dramaId}&ep=${episode.number}`;
          a.textContent = episode.title || `第${episode.number}集`;
          episodeGrid.appendChild(a);
        });
      } else {
        document.getElementById("playBtn").style.display = "none";
        episodeGrid.innerHTML = "<p>暂无集数</p>";
      }
    }

    loadDrama();
  </script>

<div id="footer"></div>

<script>
  fetch("footer.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("footer").innerHTML = html;
    });
</script>
</body>
</html>
