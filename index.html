<!DOCTYPE html>
<html>
<head>
  <title>Hong Kong Drama Website</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>

  <div id="header"></div>

  <script>
    fetch("header.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("header").innerHTML = html;

        const input = document.getElementById("searchInput");
        const button = document.getElementById("searchBtn");

        function doSearch() {
          const keyword = input.value.trim();

          if (!keyword) {
            window.location.href = "index.html";
            return;
          }

          window.location.href = "index.html?search=" + encodeURIComponent(keyword);
        }

        button.addEventListener("click", doSearch);

        input.addEventListener("keydown", function(e) {
          if (e.key === "Enter") {
            doSearch();
          }
        });
      });
  </script>

  <main>

    <section class="banner">
      <h1>2026最新在线看</h1>
      <p>立即观看</p>
    </section>

    <section class="category">
      <a href="#">动作片</a>
      <a href="#">喜剧片</a>
      <a href="#">爱情片</a>
      <a href="#">科幻片</a>
      <a href="#">剧情片</a>
      <a href="#">更多</a>
    </section>

    <h2 class="section-title">最新影片</h2>

    <!-- AUTO LOAD HERE -->
    <section class="movie-grid" id="movieList"></section>

  </main>

  <!-- FIREBASE SCRIPT -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBD7Zlt2I_I1v1kHFgymewHHDTE3dJxvMk",
      authDomain: "drama-website-f6bd8.firebaseapp.com",
      projectId: "drama-website-f6bd8",
      storageBucket: "drama-website-f6bd8.firebasestorage.app",
      messagingSenderId: "49077559897",
      appId: "1:49077559897:web:4c248dff8957b3b2cb0748"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const movieList = document.getElementById("movieList");

  async function loadDramas() {
    movieList.innerHTML = "";

    const params = new URLSearchParams(window.location.search);
    const selectedCategory = params.get("category");
    const searchKeyword = params.get("search");

    const snapshot = await getDocs(collection(db, "dramas"));

    snapshot.forEach((doc) => {
      const data = doc.data();

      if (selectedCategory && data.category !== selectedCategory) {
        return;
      }

      if (searchKeyword && !(data.title || "").toLowerCase().includes(searchKeyword.toLowerCase())) {
        return;
      }

      const card = document.createElement("div");
      card.className = "movie-card";

      card.innerHTML = `
        <span class="rating">${data.rating || ""}</span>
        
        <a href="drama.html?id=${doc.id}" class="poster-link">
          <img src="${data.poster}" alt="${data.title}">
        </a>

        <h3>${data.title}</h3>
        <p>${(data.description || "").substring(0, 15)}...</p>
        <a href="drama.html?id=${doc.id}">现在观看</a>
      `;

      movieList.appendChild(card);
    });
  }

    loadDramas();

  </script>

<div id="footer"></div>

<script>
  fetch("footer.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("footer").innerHTML = html;
    });
</script>

</body>
</html>
